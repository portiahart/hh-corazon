  <style>
    :root {
      --dark:  #1F2D3D;
      --haze:  #7A91A5;
      --ice:   #F2F5F8;
      --white: #FFFFFF;
      --teal:  #4A9B8E;
      --lemon: #FFD000;
      --mango: #FC0083;
      --font:  'DM Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--ice);
      font-family: var(--font);
      color: var(--dark);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo { height: 60px; width: auto; }

    .page {
      max-width: 580px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* HERO ROW */
    .hero-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hero-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      padding: 28px 16px;
      gap: 16px;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1.4;
      border: 2.5px solid var(--dark);
      transition: transform 0.15s, opacity 0.15s;
    }
    .hero-btn:hover { transform: translateY(-2px); opacity: 0.85; }

    .hero-btn.clock {
      background: var(--lemon);
      color: var(--dark);
    }
    .hero-btn.cash {
      background: var(--dark);
      color: var(--lemon);
    }

    /* SECTION BOXES */
    .section-box {
      border-radius: 14px;
      padding: 22px 20px;
      border: 2.5px solid var(--dark);
    }
    .box-admin  { background: var(--teal); }
    .box-ops    { background: var(--dark); }
    .box-ventas { background: var(--mango); }

    .section-label {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .box-admin  .section-label { color: rgba(255,255,255,0.55); }
    .box-ops    .section-label { color: rgba(242,245,248,0.4); }
    .box-ventas .section-label { color: rgba(255,255,255,0.55); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid-1 { display: grid; grid-template-columns: 1fr; gap: 8px; }
    @media (max-width: 380px) { .grid-2, .hero-row { grid-template-columns: 1fr; } }

    .app-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      border-radius: 10px;
      padding: 14px 12px;
      font-size: 0.63rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      transition: transform 0.15s, opacity 0.15s;
    }
    .app-btn:hover { transform: translateY(-1px); opacity: 0.82; }

    /* coming soon — dimmed */
    .app-btn.soon {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    .app-btn.soon:hover { transform: none; }

    .box-admin .app-btn {
      background: var(--ice);
      color: var(--dark);
      border: 1.5px solid rgba(31,45,61,0.15);
    }
    .box-ops .app-btn {
      background: transparent;
      color: var(--ice);
      border: 1.5px solid rgba(242,245,248,0.2);
    }
    .box-ventas .app-btn {
      background: var(--white);
      color: var(--mango);
      border: 1.5px solid rgba(255,255,255,0.5);
    }

    @media (max-width: 480px) {
      body { padding: 28px 16px 48px; }
      .hero-btn { padding: 22px 12px; }
    }
  </style>
</head>
